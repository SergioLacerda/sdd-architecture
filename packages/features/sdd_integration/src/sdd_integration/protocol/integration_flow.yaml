version: 1

metadata:
  name: integration_flow
  description: Validate SDD onboarding end-to-end
  author: sdd_framework

context:
  working_dir: temp
  isolation: true

steps:

  - id: setup_workspace
    type: filesystem.create_structure
    inputs:
      directories:
        - .github
        - .vscode
        - .cursor
        - tests/specs_ia_units
    asserts:
      - type: fs.exists
        path: .github
      - type: fs.exists
        path: tests/specs_ia_units

  - id: copy_templates
    type: filesystem.copy
    inputs:
      from: ../templates/
      to: .
    asserts:
      - type: fs.exists
        path: .spec.config
      - type: fs.exists
        path: tests/specs_ia_units/README.md

  - id: validate_config
    type: config.validate
    inputs:
      file: .spec.config
    asserts:
      - type: config.has_key
        key: spec_path
      - type: config.is_valid_path
        key: spec_path

  - id: run_validation
    type: command.exec
    inputs:
      command: "pytest tests/specs_ia_units"
    asserts:
      - type: process.exit_code
        equals: 0

  - id: git_commit
    type: git.commit
    inputs:
      message: "init spec"
    asserts:
      - type: git.has_commit