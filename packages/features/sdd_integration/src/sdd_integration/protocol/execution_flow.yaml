version: 1

metadata:
  name: execution_flow
  description: Validate execution primitives with modular context and step executor
  author: sdd_framework

context:
  working_dir: temp
  isolation: true

steps:
  - id: bootstrap_workspace
    type: filesystem.create_structure
    inputs:
      directories:
        - workspace
        - workspace/tests
    asserts:
      - type: fs.exists
        path: workspace
      - type: fs.exists
        path: workspace/tests

  - id: copy_config
    type: filesystem.copy
    inputs:
      from: ../templates/.spec.config
      to: workspace
    asserts:
      - type: fs.exists
        path: workspace/.spec.config

  - id: validate_config
    type: config.validate
    inputs:
      file: workspace/.spec.config
    asserts:
      - type: config.has_key
        key: spec_path
      - type: config.is_valid_path
        key: spec_path

  - id: run_command
    type: command.exec
    inputs:
      command: "python -c \"print('sdd execution flow ok')\""
    asserts:
      - type: process.exit_code
        equals: 0

  - id: ensure_git_state
    type: git.commit
    inputs:
      message: "execution flow snapshot"
    asserts:
      - type: git.has_commit
