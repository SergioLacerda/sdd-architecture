[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sdd-cli"
version = "3.0.0"
requires-python = ">=3.10"

dependencies = [
    "PyYAML",
    "typer[all]>=0.9.0",
    "rich>=13.0.0",
    "sdd-wizard",
    "sdd-integration",
]

[project.scripts]
sdd = "sdd_cli.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]