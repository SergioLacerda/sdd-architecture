name: 🧪 Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'tests/**'
      - '_core/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout

      - name: Discover tests
        id: discover
        run: |
          echo "::group::Test Discovery"
          find tests -name "test_*.py" -o -name "*_test.py" | head -20
          echo "::endgroup::"

      - name: Run unit tests
        id: unittest
        run: |
          echo "::group::Unit Tests"
          pytest tests/ -v --tb=short --timeout=10 2>&1 | tee test-results.txt || true
          echo "::endgroup::"

      - name: Run coverage analysis
        if: always()
        id: coverage
        run: |
          echo "::group::Coverage Analysis"
          pytest tests/ --cov=_core --cov-report=xml --cov-report=term-missing 2>&1 | tee coverage-report.txt || true
          echo "::endgroup::"

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.txt
            coverage-report.txt
            .coverage
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('test-results.txt', 'utf8');
            const passed = (results.match(/passed/g) || []).length > 0;
            
            const status = passed ? '✅' : '❌';
            const comment = `${status} **Tests**: Check runs for details`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
