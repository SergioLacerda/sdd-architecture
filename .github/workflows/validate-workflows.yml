name: 🔧 Validate Workflows

on:
  push:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Workflow YAML
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install validators
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate workflow YAML syntax
        id: validate
        run: |
          echo "::group::Validating Workflow Files"
          
          python << 'EOF'
          import yaml
          import os
          import sys
          
          errors = []
          workflow_dir = '.github/workflows'
          
          if os.path.exists(workflow_dir):
              for filename in os.listdir(workflow_dir):
                  if filename.endswith('.yml') or filename.endswith('.yaml'):
                      filepath = os.path.join(workflow_dir, filename)
                      try:
                          with open(filepath, 'r') as f:
                              yaml.safe_load(f)
                          print(f"✓ {filename}")
                      except yaml.YAMLError as e:
                          errors.append(f"✗ {filename}: {e}")
                          print(f"✗ {filename}: {e}")
          
          # Validate dependabot.yml
          if os.path.exists('.github/dependabot.yml'):
              try:
                  with open('.github/dependabot.yml', 'r') as f:
                      yaml.safe_load(f)
                  print("✓ dependabot.yml")
              except yaml.YAMLError as e:
                  errors.append(f"✗ dependabot.yml: {e}")
                  print(f"✗ dependabot.yml: {e}")
          
          if errors:
              print("\n❌ Validation failed:")
              for error in errors:
                  print(f"  {error}")
              sys.exit(1)
          else:
              print("\n✅ All workflows are valid")
              sys.exit(0)
          EOF
          
          echo "::endgroup::"

      - name: List workflows
        if: always()
        run: |
          echo "::group::Available Workflows"
          ls -lh .github/workflows/
          echo "::endgroup::"

      - name: Check workflow triggers
        if: always()
        run: |
          echo "::group::Workflow Triggers"
          
          python << 'EOF'
          import yaml
          import os
          
          workflow_dir = '.github/workflows'
          
          for filename in sorted(os.listdir(workflow_dir)):
              if filename.endswith(('.yml', '.yaml')):
                  filepath = os.path.join(workflow_dir, filename)
                  with open(filepath, 'r') as f:
                      data = yaml.safe_load(f)
                      triggers = list(data.get('on', {}).keys()) if data.get('on') else []
                      name = data.get('name', filename)
                      print(f"\n📄 {name}")
                      print(f"   File: {filename}")
                      print(f"   Triggers: {', '.join(triggers) if triggers else 'none'}")
          EOF
          
          echo "::endgroup::"

  security-check:
    name: Workflow Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for secrets in workflows
        id: secrets
        continue-on-error: true
        run: |
          echo "::group::Checking for Exposed Secrets"
          
          # Check for hardcoded credentials (basic check)
          grep -r "password\|token\|secret\|key" .github/workflows/ || echo "No obvious secrets found"
          
          echo "::endgroup::"

      - name: Verify workflow permissions
        id: permissions
        run: |
          echo "::group::Checking Workflow Permissions"
          
          python << 'EOF'
          import yaml
          import os
          
          workflow_dir = '.github/workflows'
          risky_perms = []
          
          for filename in os.listdir(workflow_dir):
              if filename.endswith(('.yml', '.yaml')):
                  filepath = os.path.join(workflow_dir, filename)
                  with open(filepath, 'r') as f:
                      data = yaml.safe_load(f)
                      perms = data.get('permissions', {})
                      
                      if perms == 'write-all' or (isinstance(perms, dict) and any(v == 'write' for v in perms.values())):
                          risky_perms.append(filename)
          
          if risky_perms:
              print("⚠️  Workflows with write permissions:")
              for f in risky_perms:
                  print(f"  - {f}")
          else:
              print("✅ Workflow permissions look safe")
          EOF
          
          echo "::endgroup::"
