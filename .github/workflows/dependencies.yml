name: 📦 Dependency Updates

on:
  schedule:
    # Check for updates weekly on Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependabot-check:
    name: Check Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Check for outdated packages
        id: check
        continue-on-error: true
        run: |
          echo "::group::Outdated Packages"
          python -m pip list --outdated 2>&1 | tee outdated-packages.txt
          echo "::endgroup::"

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: outdated-packages.txt
          retention-days: 7
