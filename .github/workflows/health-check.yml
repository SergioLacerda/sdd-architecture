name: 🏥 SDD Health Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: health-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health-check:
    name: Validate SDD Architecture Health
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run health check (explicit)
        id: health
        run: |
          python _core/tools/health_check.py --verbose > health-report.txt 2>&1
          python _core/tools/health_check.py --json > health-report.json
          echo "✅ Health check completed"

      - name: Run agent handshake validation
        id: handshake
        continue-on-error: true
        run: |
          python _core/agent_handshake.py --verbose > handshake-report.txt 2>&1
          python _core/agent_handshake.py --json > handshake-report.json
          echo "✅ Agent handshake validation completed"

      - name: Parse health status
        id: status
        run: |
          python << 'EOF'
          import json
          import os

          with open('health-report.json', 'r') as f:
              health_data = json.load(f)

          status = health_data.get('status', 'unknown')
          summary = health_data.get('summary', {})
          checks_passed = summary.get('passed', 0)
          checks_total = summary.get('total', 0)
          checks_failed = summary.get('failed', 0)

          print(f"Status: {status}")
          print(f"Checks: {checks_passed}/{checks_total}")
          print(f"::notice::Health Check: {checks_passed}/{checks_total} passed")

          # Write structured outputs for subsequent steps
          github_output = os.environ.get('GITHUB_OUTPUT', '')
          if github_output:
              with open(github_output, 'a') as f:
                  if checks_failed == 0:
                      f.write('outcome=success\n')
                  else:
                      f.write('outcome=failure\n')
                  f.write(f'checks_passed={checks_passed}\n')
                  f.write(f'checks_total={checks_total}\n')
                  f.write(f'checks_failed={checks_failed}\n')

          if checks_failed == 0:
              exit(0)
          else:
              exit(1)  # Fail CI
          EOF

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const health = JSON.parse(fs.readFileSync('health-report.json', 'utf8'));

            const summary = health.summary || {};
            const passed = summary.passed ?? 0;
            const total = summary.total ?? 0;
            const failed = summary.failed ?? 0;
            const emoji = failed === 0 ? '✅' : '⚠️';
            const comment = `${emoji} **Health Check**: ${passed}/${total} checks passed`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload health reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-reports
          path: |
            health-report.json
            health-report.txt
            handshake-report.json
            handshake-report.txt
            diagnostics-report.json
            ahp-report.json
            confidence-report.json
          retention-days: 30

      - name: Comment on PR with health status
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Load health report (always present)
            const health = JSON.parse(fs.readFileSync('health-report.json'));
            const summary = health.summary || {};
            const passed = summary.passed ?? 0;
            const total = summary.total ?? 0;
            const failed = summary.failed ?? 0;

            // AHP/confidence reports are optional (may not exist)
            let ahpState = 'N/A';
            let ahpConfidence = 'N/A';
            let ahpActions = [];
            if (fs.existsSync('ahp-report.json')) {
              const ahp = JSON.parse(fs.readFileSync('ahp-report.json'));
              ahpState = ahp.state || 'N/A';
              ahpConfidence = ahp.confidence ?? 'N/A';
              ahpActions = ahp.actions || [];
            }

            const stateEmoji = {
              'HEALTHY': '🟢', 'PARTIAL': '🟡',
              'NOT_INITIALIZED': '⚠️', 'MISCONFIGURED': '⚠️', 'NOT_CONNECTED': '❌'
            };
            const emoji = stateEmoji[ahpState] || (failed === 0 ? '✅' : '❌');

            const comment = [
              '## 🧠 SDD Architecture Health Check',
              '',
              `**State**: ${emoji} ${ahpState}`,
              `**Confidence**: ${ahpConfidence}%`,
              `**Checks Passed**: ${passed}/${total}`,
              '',
              '### Health Summary',
              `${health.status}`,
              '',
              '### Next Steps',
              ahpActions.length > 0 ? ahpActions.map(a => `- ${a}`).join('\n') : 'No actions required',
              '',
              '---',
              `**Validation Time**: ${new Date().toISOString()}`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if not healthy
        if: steps.status.outputs.outcome == 'failure'
        run: |
          echo "❌ Project health check failed (${{ steps.status.outputs.checks_failed }} checks failed)"
          exit 1

      - name: Success
        if: steps.status.outputs.outcome == 'success'
        run: |
          echo "✅ Project health check passed (${{ steps.status.outputs.checks_passed }}/${{ steps.status.outputs.checks_total }} checks)"

  integration-test:
    name: Verify AHP Integration
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: health-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Test AHP programmatic API
        run: |
          python << 'EOF'
          import sys
          sys.path.insert(0, '_core')
          
          from agent_handshake import AgentHandshakeProtocol
          
          # Test semantic trigger
          ahp = AgentHandshakeProtocol()
          
          test_cases = [
              ("estou conectado?", True),
              ("oi tudo bem?", False),
              ("implementar código", True),
              ("qual seu nome", False),
          ]
          
          print("Testing semantic trigger...")
          for user_input, expected in test_cases:
              result = ahp.should_run_handshake(user_input)
              status = "✅" if result == expected else "❌"
              print(f"{status} '{user_input}' → {result}")
              assert result == expected, f"Failed for '{user_input}'"
          
          # Test validation
          print("\nTesting AHP validation...")
          result = ahp.validate(output_mode="silent")
          print(f"State: {result.state}")
          print(f"Confidence: {result.confidence}%")
          
          print("\n✅ All tests passed")
          EOF

  summary:
    name: Health Check Summary
    runs-on: ubuntu-latest
    needs: [ health-check, integration-test ]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## SDD Architecture Health Check - Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ${{ needs.health-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All validations complete" >> $GITHUB_STEP_SUMMARY
