name: 🏗️ Governance Provider Validation (Core & Wizard)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: write
  pull-requests: write

jobs:
  governance-enforce:
    name: Governance Integrity (${{ matrix.os }} - ${{ matrix.enforcement }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        enforcement: [strict, permissive]
        os: [ubuntu-latest, windows-latest]
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip' # Melhora a velocidade da esteira
      
      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./_core[dev]"

      - name: 🛡️ Security Scan & Docker Validation (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "::group::Vulnerability Scan"
          make docker-scan
          echo "::endgroup::"
          echo "::group::Full Containerized Check"
          make docker-build
          make docker-run ENFORCEMENT=${{ matrix.enforcement }}
          echo "::endgroup::"

      - name: 🔍 Native Validation (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          make check ENFORCEMENT=${{ matrix.enforcement }}
      
      - name: Check Enforcement Level
        if: always()
        run: |
          echo "::group::Enforcement Level"
          python _core/governance_compliance.py --enforcement-check
          echo "::endgroup::"
      
      - name: Determine Merge Blocking
        if: failure()
        run: |
          echo "## ⛔ Provider Validation Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The Wizard or the Compilation Pipeline is producing invalid artifacts." >> $GITHUB_STEP_SUMMARY
          echo "Check the 'Wizard Generation Test' and 'Generated Project Certification' steps." >> $GITHUB_STEP_SUMMARY
          echo "For questions, see: docs/TROUBLESHOOTING.md" >> $GITHUB_STEP_SUMMARY

  pr-approval-check:
    needs: governance-enforce
    runs-on: ubuntu-latest
    name: PR Approval Check
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Strict Governance Label Check
        uses: actions/github-script@v9
        with:
          script: |
            const labels = context.payload.pull_request?.labels || [];
            const hasGovernanceLabel = labels.some(l => l.name === 'governance-approved');
            if (!hasGovernanceLabel) core.setFailed('PR requires "governance-approved" label to merge.');

  auto-tag:
    needs: governance-enforce
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and Push Tag
        run: |
          # Gera uma tag baseada na data e hash curto do commit
          TAG_NAME="v-auto-$(date +'%Y%m%d-%H%M')-$(git rev-parse --short HEAD)"
          echo "Creating tag: $TAG_NAME"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag -a "$TAG_NAME" -m "Automated governance-approved release"
          git push origin "$TAG_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
