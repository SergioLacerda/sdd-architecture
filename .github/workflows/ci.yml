name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    defaults:
      run:
        shell: bash   # 🔥 garante bash em TODOS os OS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 🔥 Importante: Windows precisa disso para garantir bash
      - name: Ensure bash (Windows)
        if: runner.os == 'Windows'
        run: echo "Using Git Bash"

      - name: Install SDD CLI bootstrap
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/interfaces/sdd_cli --no-deps

      - name: Setup environment
        run: |
          sdd setup run

      - name: Run tests
        run: |
          if [ -x .venv/bin/python ]; then
            .venv/bin/python scripts/run_all_tests.py
          elif [ -x .venv/Scripts/python.exe ]; then
            .venv/Scripts/python.exe scripts/run_all_tests.py
          else
            python scripts/run_all_tests.py
          fi

  docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material

      - name: Install SDD CLI bootstrap
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/interfaces/sdd_cli --no-deps

      - name: Deploy docs
        run: sdd docs deploy

  release:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build backend
        run: |
          pip install build

      - name: Install SDD CLI bootstrap
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/interfaces/sdd_cli --no-deps

      - name: Build package
        run: sdd release build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.ref_name }}
          path: dist/*
