name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    defaults:
      run:
        shell: bash   # 🔥 garante bash em TODOS os OS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 🔥 Importante: Windows precisa disso para garantir bash
      - name: Ensure bash (Windows)
        if: runner.os == 'Windows'
        run: echo "Using Git Bash"

      - name: Setup environment
        run: |
          chmod +x setup.sh
          ./setup.sh

      - name: Run tests
        run: |
          python scripts/run_all_tests.py

  docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material

      - name: Deploy docs
        run: |
          if [ -f mkdocs.yml ] || [ -f mkdocs.yaml ]; then
            mkdocs gh-deploy --force
          else
            echo "No mkdocs config found (mkdocs.yml/mkdocs.yaml). Skipping docs deploy."
          fi

  release:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.ref_name }}
          path: dist/*
