name: đźš€ Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 3.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            # Extract from tag or use current date
            VERSION=$(git describe --tags --always 2>/dev/null | sed 's/^v//' || date +%Y.%m.%d)
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          echo "::group::Generating Changelog"
          
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~20")
          
          cat > CHANGELOG_NEW.md << 'EOF'
          ## Release Notes
          
          ### New Features
          - Improved GitHub Actions workflow
          - Enhanced documentation system
          - Better error handling
          
          ### Bug Fixes
          - Fixed health check reporting
          - Improved governance validation
          
          ### Documentation
          - Updated all guides
          - Added examples
          
          EOF
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG_NEW.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "::endgroup::"

      - name: Create git tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION" || true
          fi

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-v${{ steps.version.outputs.version }}
          path: |
            README.md
            CHANGELOG.md
            docs/
          retention-days: 90

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: create-release
    if: success()

    steps:
      - name: Release Summary
        run: |
          cat << 'EOF'
          
          âś… Release v${{ needs.create-release.outputs.version }} Created!
          
          Visit: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}
          
          EOF

      - name: Comment on pull requests
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'đźš€ Release v${{ needs.create-release.outputs.version }} published!'
            });
