name: 🔍 Lint & Code Quality

on:
  push:
    branches: [ main, develop ]
    paths:
      - '_core/**'
      - 'tests/**'
      - '*.py'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 black isort mypy

      - name: Format check (Black)
        id: black
        continue-on-error: true
        run: |
          echo "::group::Black Format Check"
          black --check _core/ tests/ --diff 2>&1 | tee black-report.txt
          echo "::endgroup::"

      - name: Import sorting (isort)
        id: isort
        continue-on-error: true
        run: |
          echo "::group::isort Import Check"
          isort --check-only _core/ tests/ --diff 2>&1 | tee isort-report.txt
          echo "::endgroup::"

      - name: Linting (Flake8)
        id: flake8
        continue-on-error: true
        run: |
          echo "::group::Flake8 Linting"
          flake8 _core/ tests/ --count --statistics 2>&1 | tee flake8-report.txt
          echo "::endgroup::"

      - name: Type checking (mypy)
        id: mypy
        continue-on-error: true
        run: |
          echo "::group::mypy Type Check"
          mypy _core/ --ignore-missing-imports 2>&1 | tee mypy-report.txt || true
          echo "::endgroup::"

      - name: Code complexity (pylint)
        id: pylint
        continue-on-error: true
        run: |
          echo "::group::pylint Analysis"
          pylint _core/ --exit-zero 2>&1 | tee pylint-report.txt
          echo "::endgroup::"

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            black-report.txt
            isort-report.txt
            flake8-report.txt
            mypy-report.txt
            pylint-report.txt
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let message = '## 🔍 Code Quality Report\n\n';
            
            const checks = [
              { file: 'black-report.txt', name: 'Black' },
              { file: 'isort-report.txt', name: 'isort' },
              { file: 'flake8-report.txt', name: 'Flake8' },
              { file: 'mypy-report.txt', name: 'mypy' },
              { file: 'pylint-report.txt', name: 'pylint' }
            ];
            
            message += '| Tool | Status |\n|------|--------|\n';
            
            checks.forEach(check => {
              try {
                const content = fs.readFileSync(check.file, 'utf8');
                const status = content.includes('error') || content.includes('Error') ? '❌' : '✅';
                message += `| ${check.name} | ${status} |\n`;
              } catch (e) {
                message += `| ${check.name} | ⚠️ |\n`;
              }
            });
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Security scan (Bandit)
        id: bandit
        continue-on-error: true
        run: |
          echo "::group::Bandit Security Scan"
          bandit -r _core/ tests/ -f json -o bandit-report.json 2>&1 | tee bandit-report.txt || true
          echo "::endgroup::"

      - name: Dependency check (Safety)
        id: safety
        continue-on-error: true
        run: |
          echo "::group::Safety Dependency Check"
          safety check --json 2>&1 | tee safety-report.txt || true
          echo "::endgroup::"

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            bandit-report.txt
            safety-report.txt
          retention-days: 30
