name: Bootstrap SDD CLI
description: Install minimal dependencies and local sdd CLI command

runs:
  using: composite
  steps:
    - name: Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip

    - name: Install CLI runtime dependencies
      shell: bash
      run: python -m pip install "typer[all]>=0.9.0" "rich>=13.0.0" "PyYAML"

    - name: Install local sdd CLI
      shell: bash
      run: python -m pip install -e packages/interfaces/sdd_cli --no-deps

    - name: Verify sdd command
      shell: bash
      run: sdd --help > /dev/null
